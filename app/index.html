<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="theme-color" content="#3a8af8">
    <meta name="description" content="Little Bird is a private local app for small-business goals, connected store metrics, integrations, and local AI help.">
    <title>Little Bird</title>
    <link rel="manifest" href="manifest.webmanifest">
    <link rel="stylesheet" href="styles.css?v=0.3.1">
  </head>
  <body>
    <svg class="svg-sprite" aria-hidden="true" focusable="false">
      <symbol id="icon-home" viewBox="0 0 24 24">
        <path d="M3 11.5 12 4l9 7.5v7a1.5 1.5 0 0 1-1.5 1.5h-15A1.5 1.5 0 0 1 3 18.5v-7Z"/>
        <path d="M9 20v-6h6v6"/>
      </symbol>
      <symbol id="icon-target" viewBox="0 0 24 24">
        <circle cx="12" cy="12" r="8"/>
        <circle cx="12" cy="12" r="4"/>
        <path d="M12 2v3M12 19v3M2 12h3M19 12h3"/>
      </symbol>
      <symbol id="icon-chart" viewBox="0 0 24 24">
        <path d="M4 19V5"/>
        <path d="M4 19h16"/>
        <path d="M8 16v-5"/>
        <path d="M12 16V8"/>
        <path d="M16 16v-3"/>
      </symbol>
      <symbol id="icon-flask" viewBox="0 0 24 24">
        <path d="M9 3h6"/>
        <path d="M10 3v5l-5.5 9A3 3 0 0 0 7 21h10a3 3 0 0 0 2.5-4L14 8V3"/>
        <path d="M7 16h10"/>
      </symbol>
      <symbol id="icon-bird" viewBox="0 0 24 24">
        <path d="M5 14c0-5 4-9 9-9 2 0 4 1 5 2l3-1-2 3c1 1 1 3 1 4 0 5-4 8-9 8H6a1 1 0 0 1-1-1v-6Z"/>
        <path d="M10 15l6-5"/>
        <path d="M7 18c3-1 5-2 7-4"/>
      </symbol>
      <symbol id="icon-settings" viewBox="0 0 24 24">
        <path d="M12 15.5a3.5 3.5 0 1 0 0-7 3.5 3.5 0 0 0 0 7Z"/>
        <path d="M19.4 15a1.7 1.7 0 0 0 .3 1.9l.1.1a2 2 0 0 1-2.8 2.8l-.1-.1a1.7 1.7 0 0 0-1.9-.3 1.7 1.7 0 0 0-1 1.6V21a2 2 0 0 1-4 0v-.1a1.7 1.7 0 0 0-1-1.5 1.7 1.7 0 0 0-1.9.3l-.1.1A2 2 0 0 1 4.2 17l.1-.1a1.7 1.7 0 0 0 .3-1.9 1.7 1.7 0 0 0-1.6-1H3a2 2 0 0 1 0-4h.1a1.7 1.7 0 0 0 1.5-1 1.7 1.7 0 0 0-.3-1.9L4.2 7A2 2 0 0 1 7 4.2l.1.1a1.7 1.7 0 0 0 1.9.3h.1a1.7 1.7 0 0 0 .9-1.5V3a2 2 0 0 1 4 0v.1a1.7 1.7 0 0 0 1 1.5 1.7 1.7 0 0 0 1.9-.3l.1-.1A2 2 0 0 1 19.8 7l-.1.1a1.7 1.7 0 0 0-.3 1.9v.1a1.7 1.7 0 0 0 1.5.9h.1a2 2 0 0 1 0 4h-.1a1.7 1.7 0 0 0-1.5 1Z"/>
      </symbol>
      <symbol id="icon-plus" viewBox="0 0 24 24">
        <path d="M12 5v14"/>
        <path d="M5 12h14"/>
      </symbol>
      <symbol id="icon-sync" viewBox="0 0 24 24">
        <path d="M20 7v5h-5"/>
        <path d="M4 17v-5h5"/>
        <path d="M18 9a7 7 0 0 0-11.5-2"/>
        <path d="M6 15a7 7 0 0 0 11.5 2"/>
      </symbol>
      <symbol id="icon-check" viewBox="0 0 24 24">
        <path d="m5 12 4 4L19 6"/>
      </symbol>
      <symbol id="icon-calendar" viewBox="0 0 24 24">
        <rect x="4" y="5" width="16" height="15" rx="2"/>
        <path d="M8 3v4M16 3v4M4 10h16"/>
      </symbol>
      <symbol id="icon-pen" viewBox="0 0 24 24">
        <path d="m4 20 4.5-1 10-10a2.2 2.2 0 0 0-3.1-3.1l-10 10L4 20Z"/>
        <path d="m14 7 3 3"/>
      </symbol>
      <symbol id="icon-send" viewBox="0 0 24 24">
        <path d="m21 3-7 18-4-8-8-4 19-6Z"/>
        <path d="m10 13 11-10"/>
      </symbol>
      <symbol id="icon-dollar" viewBox="0 0 24 24">
        <path d="M12 2v20"/>
        <path d="M17 6.5c-1-1-2.5-1.5-4-1.5-2.2 0-4 1.1-4 3 0 4.5 8 2 8 7 0 1.8-1.8 3-4 3-1.8 0-3.4-.6-4.5-1.8"/>
      </symbol>
      <symbol id="icon-users" viewBox="0 0 24 24">
        <circle cx="9" cy="8" r="3"/>
        <path d="M3 20a6 6 0 0 1 12 0"/>
        <path d="M16 11a3 3 0 1 0-.7-5.9"/>
        <path d="M17 20a5 5 0 0 0-3-4.6"/>
      </symbol>
      <symbol id="icon-bag" viewBox="0 0 24 24">
        <path d="M6 8h12l-1 13H7L6 8Z"/>
        <path d="M9 8a3 3 0 0 1 6 0"/>
      </symbol>
      <symbol id="icon-video" viewBox="0 0 24 24">
        <rect x="3" y="6" width="13" height="12" rx="2"/>
        <path d="m16 10 5-3v10l-5-3"/>
      </symbol>
      <symbol id="icon-bell" viewBox="0 0 24 24">
        <path d="M18 9a6 6 0 1 0-12 0c0 7-3 7-3 9h18c0-2-3-2-3-9Z"/>
        <path d="M10 21h4"/>
      </symbol>
      <symbol id="icon-moon" viewBox="0 0 24 24">
        <path d="M20 15.5A8 8 0 0 1 8.5 4a8.5 8.5 0 1 0 11.5 11.5Z"/>
      </symbol>
    </svg>

    <div class="app-shell">
      <header class="topbar">
        <button class="avatar-button" type="button" data-route="bird" aria-label="Open Little Bird">
          <img src="assets/bird-mark.svg" alt="">
        </button>
        <div class="title-block">
          <p class="wordmark" id="wordmark">BIRD</p>
          <h1 id="viewTitle">Dashboard</h1>
        </div>
        <button class="icon-button" id="settingsButton" type="button" aria-label="Settings">
          <svg><use href="#icon-settings"></use></svg>
        </button>
      </header>

      <main id="screen" class="screen" aria-live="polite"></main>

      <button class="fab" id="fabButton" type="button" aria-label="Add">
        <svg><use href="#icon-plus"></use></svg>
      </button>

      <nav class="bottom-nav" aria-label="Primary navigation">
        <button type="button" class="nav-item is-active" data-route="home">
          <svg><use href="#icon-home"></use></svg>
          <span>Home</span>
        </button>
        <button type="button" class="nav-item" data-route="goals">
          <svg><use href="#icon-target"></use></svg>
          <span>Goals</span>
        </button>
        <button type="button" class="nav-item" data-route="metrics">
          <svg><use href="#icon-chart"></use></svg>
          <span>Metrics</span>
        </button>
        <button type="button" class="nav-item" data-route="experiments">
          <svg><use href="#icon-flask"></use></svg>
          <span>Tests</span>
        </button>
        <button type="button" class="nav-item" data-route="bird">
          <svg><use href="#icon-bird"></use></svg>
          <span>Bird</span>
        </button>
      </nav>
    </div>

    <div id="modalRoot" class="modal-root" aria-hidden="true"></div>
    <div id="toast" class="toast" role="status" aria-live="polite"></div>

    <script src="app.js?v=0.3.1"></script>
  </body>
</html>
